[project]
name = "agentic-doc-core"
version = "0.1.0"
description = "Shared configuration and foundational types for the agentic-doc workspace."
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.14.2",
]

[build-system]
requires = ["uv_build>=0.11.23,<0.12.0"]
build-backend = "uv_build"
