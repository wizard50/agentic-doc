[project]
name = "agentic-doc-rag"
version = "0.1.0"
description = "RAG retrieval layer — chunking, embeddings, and vector store abstractions."
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "agentic-doc-core",
    "chromadb>=1.5.9",
    "pydantic>=2.0",
    "pydantic-settings>=2.14.2",
]

[build-system]
requires = ["uv_build>=0.11.23,<0.12.0"]
build-backend = "uv_build"
