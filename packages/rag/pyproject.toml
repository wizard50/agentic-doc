[project]
name = "agentic-doc-rag"
version = "0.1.0"
description = "RAG retrieval layer — chunking, embeddings, and vector store abstractions."
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "agentic-doc-core",
    "arize-phoenix-client>=2.12.0",
    "arize-phoenix-evals>=3.1.0",
    "arize-phoenix-otel>=0.16.1",
    "chromadb>=1.5.9",
    "openinference-semantic-conventions>=0.1.30",
    "opentelemetry-api>=1.43.0",
    "pandas>=2.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.14.2",
    "rank-bm25>=0.2.2",
]

[build-system]
requires = ["uv_build>=0.11.23,<0.12.0"]
build-backend = "uv_build"
